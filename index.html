<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачное приложение: Auth, DMs, Presence</title>
    <style>
        /* Базовые светлые стили из твоего старого кода */
        :root {
            --bg-color: #f4f7f6;
            --container-bg: white;
            --text-color: #333;
            --border-color: #ddd;
            --input-bg: #fff;
            --btn-hover: #e2e6ea;
        }

        /* Темная тема */
        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444;
            --input-bg: #2c2c2c;
            --btn-hover: #555;
        }

        /* Черно-белый фильтр (по заданию) */
        body.bw-mode { filter: grayscale(100%); }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            transition: background 0.3s, color 0.3s, filter 0.3s;
        }

        .header-bar { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .online-badge { background: #28a745; color: white; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        
        .container { width: 100%; max-width: 600px; background: var(--container-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid var(--border-color); width: 100%; box-sizing: border-box; background: var(--input-bg); color: var(--text-color); }
        
        button { background: #007bff; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #0056b3; }
        .btn-secondary { background: var(--container-bg); color: var(--text-color); border: 1px solid var(--border-color); width: auto;}
        
        .auth-bar { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; }
        .post { background: var(--container-bg); border: 1px solid var(--border-color); padding: 15px; margin-top: 15px; border-radius: 8px; }
        .post img.content-img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
        .dm-badge { background: #ff4757; color: white; padding: 2px 6px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="online-badge">🟢 Онлайн: <span id="onlineCount">...</span></div>
        <div style="display: flex; gap: 5px;">
            <button id="themeToggle" class="btn-secondary">🌙 Темная тема</button>
            <button id="toggleBwBtn" class="btn-secondary">👁️ Ч/Б Фильтр</button>
            <button id="toggleSoundBtn" class="btn-secondary">🔊 Звук: Вкл</button>
        </div>
    </div>

    <div id="authSection" class="container">
        <button id="loginBtn">Войти через Google</button>
        <div id="userInfo" style="display: none;" class="auth-bar">
            <img id="userPhoto" class="user-avatar" src="" alt="Аватар">
            <span id="userName" style="font-weight: bold;"></span>
            <button id="logoutBtn" style="width: auto; background: #ff4757; color: white;">Выйти</button>
        </div>
    </div>

    <div id="messageForm" class="container" style="display: none;">
        <h3>Создать пост в ленту</h3>
        <input type="text" id="content" placeholder="Что у вас нового?">
        <input type="file" id="imageUpload" accept="image/*">
        <button id="mainBtn">Опубликовать</button>
    </div>

    <div id="dmForm" class="container" style="display: none;">
        <h3>Отправить личное сообщение</h3>
        <input type="email" id="dmReceiver" placeholder="Email получателя">
        <input type="text" id="dmContent" placeholder="Текст сообщения">
        <button id="dmBtn" style="background: #2ed573;">Отправить DM</button>
    </div>

    <div class="container">
        <h3>Общая лента</h3>
        <div id="feed"></div>
    </div>
    
    <div class="container" id="dmContainer" style="display: none;">
        <h3>Мои сообщения</h3>
        <div id="dmFeed"></div>
    </div>

    <script type="module">
        // ИМПОРТЫ FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";
        import { getDatabase, ref as dbRef, onValue, onDisconnect, set, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // ВСТАВЬ СЮДА СВОИ КЛЮЧИ!
        // Важно: добавь databaseURL для работы счетчика онлайна
        const firebaseConfig = {
    apiKey: "AIzaSyDGp3HhpUBFdVpsp2APcQr-uu6suZSQa6k",
    authDomain: "procj-1c340.firebaseapp.com",
    databaseURL: "https://procj-1c340-default-rtdb.firebaseio.com", // Добавлено для счетчика онлайна
    projectId: "procj-1c340",
    storageBucket: "procj-1c340.firebasestorage.app",
    messagingSenderId: "213350806342",
    appId: "1:213350806342:web:53d355b493918489ddab47"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const rtdb = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // --- 1. ЛОГИКА ИНТЕРФЕЙСА (Темы, Фильтры, Звук) ---
        let soundEnabled = true;
        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        
        function playSound() { if (soundEnabled) notificationSound.play().catch(e => console.log("Звук заблокирован")); }

        document.getElementById('toggleSoundBtn').onclick = (e) => {
            soundEnabled = !soundEnabled;
            e.target.innerText = soundEnabled ? "🔊 Звук: Вкл" : "🔇 Звук: Выкл";
        };

        document.getElementById('toggleBwBtn').onclick = () => document.body.classList.toggle('bw-mode');

        // Темная тема (из твоего старого кода)
        const themeToggleBtn = document.getElementById("themeToggle");
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            themeToggleBtn.innerText = "☀️ Светлая тема";
        }
        themeToggleBtn.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            if (document.body.classList.contains("dark-mode")) {
                localStorage.setItem("theme", "dark");
                themeToggleBtn.innerText = "☀️ Светлая тема";
            } else {
                localStorage.setItem("theme", "light");
                themeToggleBtn.innerText = "🌙 Темная тема";
            }
        });

        // --- 2. СЧЕТЧИК ОНЛАЙНА (из твоего старого кода) ---
        function setupPresence() {
            const connectedRef = dbRef(rtdb, ".info/connected");
            const connectionsRef = dbRef(rtdb, "connections");
            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    const myConnectionRef = push(connectionsRef);
                    onDisconnect(myConnectionRef).remove();
                    set(myConnectionRef, true);
                }
            });
            onValue(connectionsRef, (snap) => {
                document.getElementById("onlineCount").innerText = snap.numChildren();
            });
        }
        setupPresence();

        // --- 3. АВТОРИЗАЦИЯ И РАЗБЛОКИРОВКА ИНТЕРФЕЙСА ---
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authElems = ['userInfo', 'messageForm', 'dmForm', 'dmContainer'];
            if (user) {
                document.getElementById('loginBtn').style.display = 'none';
                authElems.forEach(id => document.getElementById(id).style.display = id === 'userInfo' ? 'flex' : 'block');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
                loadDirectMessages();
            } else {
                document.getElementById('loginBtn').style.display = 'block';
                authElems.forEach(id => document.getElementById(id).style.display = 'none');
            }
        });

        // --- 4. ПУБЛИКАЦИЯ ПОСТА С КАРТИНКОЙ ---
        document.getElementById('mainBtn').onclick = async () => {
            if (!currentUser) return;
            const content = document.getElementById('content').value;
            const fileInput = document.getElementById('imageUpload').files[0];
            if (!content && !fileInput) return alert("Пустой пост!");

            document.getElementById('mainBtn').disabled = true;
            try {
                let imageUrl = null;
                if (fileInput) {
                    const fileRef = storageRef(storage, 'uploads/' + Date.now() + '_' + fileInput.name);
                    await uploadBytes(fileRef, fileInput);
                    imageUrl = await getDownloadURL(fileRef);
                }

                await addDoc(collection(db, "requests"), {
                    name: currentUser.displayName,
                    email: currentUser.email,
                    photo: currentUser.photoURL,
                    text: content,
                    imageUrl: imageUrl,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                playSound();
                document.getElementById('content').value = "";
                document.getElementById('imageUpload').value = "";
            } catch (e) { alert("Ошибка: " + e.message); }
            document.getElementById('mainBtn').disabled = false;
        };

        // --- 5. ОТПРАВКА DM ---
        document.getElementById('dmBtn').onclick = async () => {
            if (!currentUser) return;
            const receiver = document.getElementById('dmReceiver').value;
            const text = document.getElementById('dmContent').value;
            if (!receiver || !text) return;

            try {
                await addDoc(collection(db, "dms"), {
                    senderEmail: currentUser.email,
                    senderName: currentUser.displayName,
                    receiverEmail: receiver,
                    text: text,
                    timestamp: serverTimestamp()
                });
                playSound();
                document.getElementById('dmContent').value = "";
                alert("DM отправлено!");
            } catch (e) { alert("Ошибка: " + e.message); }
        };

        // --- 6. ЧТЕНИЕ ЛЕНТЫ И ЛАЙКИ ---
        window.processLike = async (id) => {
            if (!currentUser) return alert("Войдите для лайков!");
            await updateDoc(doc(db, "requests", id), { likes: increment(1) });
        };

        onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                let imageHtml = data.imageUrl ? `<img src="${data.imageUrl}" class="content-img">` : '';
                feed.innerHTML += `
                    <div class="post">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${data.photo || 'https://via.placeholder.com/30'}" style="width:30px; border-radius:50%;">
                            <b>${data.name}</b>
                        </div>
                        <p>${data.text}</p>
                        ${imageHtml}
                        <br><button onclick="processLike('${docSnap.id}')" class="btn-secondary">👍 Лайк (${data.likes || 0})</button>
                    </div>
                `;
            });
        });

        // --- 7. ЧТЕНИЕ DM ---
        function loadDirectMessages() {
            if (!currentUser) return;
            const qDms = query(collection(db, "dms"), where("receiverEmail", "==", currentUser.email));
            onSnapshot(qDms, (snapshot) => {
                const dmFeed = document.getElementById('dmFeed');
                dmFeed.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    dmFeed.innerHTML += `
                        <div class="post" style="border-left: 4px solid #ff4757;">
                            <span class="dm-badge">Вам письмо</span>
                            <p><b>От:</b> ${data.senderName} (${data.senderEmail})</p>
                            <p>${data.text}</p>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
